<div class="admin-container">

    <h2>Panel de administración</h2>

    <table class="appointments-table">

        <thead>
        <tr>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Paciente</th>
            <th>DNI</th>
            <th>Teléfono</th>
            <th>Cobertura</th>
            <th>Motivo</th>
            <th>Acción</th>
        </tr>
        </thead>

        <tbody>
        @for (a of appointments; track a) {
            <tr>

            <td>{{ a.date }}</td>
            <td>{{ a.time }}</td>
            <td>{{ a.patientName }}</td>
            <td>{{ a.dni }}</td>
            <td>{{ a.phone }}</td>
            <td>{{ a.coverage }}</td>
            <td>{{ a.reason }}</td>

            <td>
                <button 
                (click)="cancelar(a)"
                [disabled]="isPast(a)">
                Cancelar
                </button>
            </td>

            </tr>
        }
        </tbody>

    </table>

</div>
